[multi_pin cooling_fans]
pins: toolhead:PD3,toolhead:PA5

[fan]
pin: multi_pin:cooling_fans
kick_start_time: 0.25
cycle_time: 0.01
min_power: 0.20

[heater_fan hotend_fan]
pin: toolhead:PD2
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
tachometer_pin: ^toolhead:PA4
tachometer_ppr: 2
tachometer_poll_interval: 0.00080


[controller_fan casefan1]
pin: PA1
tachometer_pin:PC3
kick_start_time: 0.5
heater: heater_bed
fan_speed: 1

[controller_fan casefan2]
pin: PF8
tachometer_pin:PC1
kick_start_time: 0.5
heater: heater_bed
fan_speed: 1