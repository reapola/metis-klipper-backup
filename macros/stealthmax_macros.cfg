[gcode_macro vent_25]
gcode:
    NEVERMORE_VENT_SERVO_SET PERCENT=0.75 HOLD_FOR=0.25

[gcode_macro vent_50]
gcode:
    NEVERMORE_VENT_SERVO_SET PERCENT=0.50 HOLD_FOR=0.25

[gcode_macro vent_75]
gcode:
    NEVERMORE_VENT_SERVO_SET PERCENT=0.75 HOLD_FOR=0.25

[gcode_macro close_vent]
gcode: 
    NEVERMORE_VENT_SERVO_SET PERCENT=1 HOLD_FOR=0.25

[gcode_macro open_vent]
gcode:
    NEVERMORE_VENT_SERVO_SET PERCENT=0 HOLD_FOR=0.25